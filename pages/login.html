<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to AquaDesign - Premium Aquascaping Services">
  <title>Login | AquaDesign</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- CSS Variables & Global Styles -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌊</text></svg>">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    [data-theme="light"] {
      --glass-bg: #ffffff;
      --glass-border: rgba(0, 0, 0, 0.05);
      --auth-bg-gradient: none;
    }

    [data-theme="dark"] {
      --auth-bg-gradient: radial-gradient(circle at top right, var(--aqua-teal-light), transparent),
        radial-gradient(circle at bottom left, rgba(0, 0, 0, 0.05), transparent);
    }

    body {
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--auth-bg-gradient);
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
      padding: 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--shadow-xl);
      animation: fadeIn 0.8s ease-out;
    }

    [data-theme="light"] .auth-card {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--aqua-teal) !important;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-bottom: 2.5rem;
      transition: color 0.3s ease;
    }

    .brand-logo:hover {
      color: var(--aqua-light) !important;
    }

    .auth-title {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      text-align: center;
    }

    .auth-subtitle {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .form-label {
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .form-control {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background: var(--bg-primary);
      border-color: var(--aqua-teal);
      box-shadow: 0 0 0 4px var(--aqua-teal-light);
      color: var(--text-primary);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 2rem 0;
      color: var(--text-secondary);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }

    .divider:not(:empty)::before {
      margin-right: 1rem;
    }

    .divider:not(:empty)::after {
      margin-left: 1rem;
    }

    .btn-auth {
      background: var(--aqua-teal);
      color: var(--dark-navy) !important;
      width: 100%;
      margin-top: 1.5rem;
      border: none;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
    }

    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .btn-social {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 100%;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .btn-social span {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--aqua-teal);
      text-decoration: none;
      font-weight: 600;
    }

    .back-home {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .back-home:hover {
      color: var(--text-primary);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
    }

    .password-toggle:hover {
      opacity: 1;
      color: var(--aqua-teal);
    }

    @media (max-width: 768px) {
      .auth-wrapper {
        padding: 4.5rem 1rem 1.5rem !important;
      }

      .auth-card {
        padding: 2rem 1.5rem !important;
        border-radius: 20px !important;
      }

      .auth-title {
        font-size: 1.8rem !important;
        line-height: 1.2 !important;
        margin-bottom: 0.75rem !important;
      }

      .top-utility-bar {
        padding: 1rem 1.25rem !important;
        gap: 1rem !important;
      }

      .back-home {
        font-size: 0.85rem !important;
      }

      .remember-forgot {
        font-size: 0.8rem !important;
      }

      .social-btns {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>

<body>

  <div class="top-utility-bar"
    style="position: absolute; top: 0; left: 0; width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 2rem; z-index: 100;">
    <a href="../index.html" class="back-home" style="position: static;">
      ← Back to Site
    </a>
    <button class="theme-toggle" title="Toggle Theme"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
      </svg></button>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="../index.html" class="brand-logo">🌊 AquaDesign</a>

      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Enter your details to access your dashboard</p>

      <form>
        <div class="mb-4">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" placeholder="name@company.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" id="passwordInput" class="form-control" placeholder="••••••••" required>
            <button type="button" class="password-toggle" id="togglePassword">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 remember-forgot">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe" style="font-size: inherit; color: var(--text-secondary);">
              Remember me
            </label>
          </div>
          <a href="#" style="color: var(--aqua-teal); text-decoration: none; font-size: inherit;">Forgot password?</a>
        </div>


        <button type="submit" class="btn-auth">Sign In</button>

        <div class="divider">or continue with</div>

        <div class="social-btns">
          <button type="button" class="btn-social">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 488 512">
              <path
                d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z" />
            </svg> Google
          </button>
          <button type="button" class="btn-social">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 384 512">
              <path
                d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z" />
            </svg> Apple
          </button>
        </div>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one here</a>
      </div>
    </div>
  </div>



  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('passwordInput');
    const eyeIcon = `
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
    `;
    const eyeOffIcon = `
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
    `;

    togglePassword?.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.innerHTML = type === 'password' ? eyeIcon : eyeOffIcon;
    });
  </script>
  <script src="../assets/js/script.js"></script>
</body>

</html>
