<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to AquaDesign - Premium Aquascaping Services">
  <title>Login | AquaDesign</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- CSS Variables & Global Styles -->
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    [data-theme="light"] {
      --glass-bg: #ffffff;
      --glass-border: rgba(0, 0, 0, 0.05);
      --auth-bg-gradient: none;
    }

    [data-theme="dark"] {
      --auth-bg-gradient: radial-gradient(circle at top right, var(--aqua-teal-light), transparent),
                          radial-gradient(circle at bottom left, rgba(0,0,0,0.05), transparent);
    }

    body {
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Poppins', sans-serif;
    }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--auth-bg-gradient);
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
      padding: 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--shadow-xl);
      animation: fadeIn 0.8s ease-out;
    }

    [data-theme="light"] .auth-card {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: 0 20px 40px rgba(0,0,0,0.03);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      display: block;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      text-align: center;
    }

    .auth-subtitle {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .form-label {
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .form-control {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background: var(--bg-primary);
      border-color: var(--aqua-teal);
      box-shadow: 0 0 0 4px var(--aqua-teal-light);
      color: var(--text-primary);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 2rem 0;
      color: var(--text-secondary);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }

    .divider:not(:empty)::before { margin-right: 1rem; }
    .divider:not(:empty)::after { margin-left: 1rem; }

    .btn-auth {
      background: var(--aqua-teal);
      color: var(--dark-navy) !important;
      width: 100%;
      margin-top: 1.5rem;
      border: none;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
    }

    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .btn-social {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 100%;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .btn-social span {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--aqua-teal);
      text-decoration: none;
      font-weight: 600;
    }

    .back-home {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .back-home:hover {
      color: var(--text-primary);
    }
  </style>
</head>

<body>

  <a href="../index.html" class="back-home">
    ← Back to Site
  </a>

  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="../index.html" class="brand-logo">🌊 AquaDesign</a>
      
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Enter your details to access your dashboard</p>

      <form>
        <div class="mb-4">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" placeholder="name@company.com" required>
        </div>
        <div class="mb-3">
          <div class="d-flex justify-content-between mb-1">
            <label class="form-label">Password</label>
            <a href="#" style="color: var(--aqua-teal); text-decoration: none; font-size: 0.85rem;">Forgot password?</a>
          </div>
          <input type="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-auth">Sign In</button>

        <div class="divider">or continue with</div>

        <div class="social-btns">
          <button type="button" class="btn-social">
            <span>G</span> Google
          </button>
          <button type="button" class="btn-social">
            <span>A</span> Apple
          </button>
        </div>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one here</a>
      </div>
    </div>
  </div>



  <script src="../assets/js/script.js"></script>
</body>

</html>
