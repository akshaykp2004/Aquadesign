<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create an account with AquaDesign - Premium Aquascaping Services">
  <title>Sign Up | AquaDesign</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- CSS Variables & Global Styles -->
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    [data-theme="light"] {
      --glass-bg: #ffffff;
      --glass-border: rgba(0, 0, 0, 0.05);
      --auth-bg-gradient: none;
    }

    [data-theme="dark"] {
      --auth-bg-gradient: radial-gradient(circle at bottom right, var(--aqua-teal-light), transparent),
                          radial-gradient(circle at top left, rgba(0,0,0,0.05), transparent);
    }

    body {
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Poppins', sans-serif;
    }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: var(--auth-bg-gradient);
    }

    .auth-card {
      width: 100%;
      max-width: 500px;
      padding: 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--shadow-xl);
      animation: fadeIn 0.8s ease-out;
    }

    [data-theme="light"] .auth-card {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: 0 20px 40px rgba(0,0,0,0.03);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      display: block;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      text-align: center;
    }

    .auth-subtitle {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .form-label {
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .form-control {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background: var(--bg-primary);
      border-color: var(--aqua-teal);
      box-shadow: 0 0 0 4px var(--aqua-teal-light);
      color: var(--text-primary);
    }

    .btn-auth {
      background: var(--aqua-teal);
      color: var(--dark-navy) !important;
      width: 100%;
      margin-top: 2rem;
      border: none;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--aqua-teal);
      text-decoration: none;
      font-weight: 600;
    }

    .back-home {
      position: absolute;
      top: 2rem;
      left: 2rem;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .back-home:hover {
      color: var(--text-primary);
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .checkbox-container input {
      margin-top: 0;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <a href="../index.html" class="back-home">
    ← Back to Site
  </a>

  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="../index.html" class="brand-logo">🌊 AquaDesign</a>
      
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join us to start your aquascaping journey</p>

      <form>
        <div class="row">
          <div class="col-md-6 mb-4">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="col-md-6 mb-4">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" placeholder="name@company.com" required>
          </div>
        </div>
        
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="checkbox-container">
          <input type="checkbox" required>
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
        </div>

        <button type="submit" class="btn-auth">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in here</a>
      </div>
    </div>
  </div>



  <script src="../assets/js/script.js"></script>
</body>

</html>
